name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # mlx-lm is mac-only; install everything else for tests.
        run: |
          uv sync --extra dev --no-install-package mlx-lm || true
          uv pip install pydantic typer rich pytest pytest-cov ruff mypy

      - name: Run tests with coverage
        run: |
          # Tests don't require mlx-lm at import time except where guarded.
          uv run --no-sync python -m pytest -q \
            --ignore=tests/test_train_runner.py \
            --cov=src/dreamagent \
            --cov-report=term-missing

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage*
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff
        run: ruff check src tests benchmarks

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Run mypy in an ephemeral venv
        # mypy is informational for now — won't fail CI yet, but surfaces issues
        run: |
          uv run --no-project --with pydantic --with mypy \
            mypy --config-file mypy.ini src/dreamagent || true

  validate-schema:
    name: Schema + Fixtures Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Validate every fixture parses under MemoryItem
        # uv run --with creates an ephemeral env; works on PEP 668 systems
        # where --system pip installs are blocked.
        run: |
          uv run --no-project --with pydantic python -c "
          from pathlib import Path
          from pydantic import ValidationError
          import sys
          sys.path.insert(0, 'src')
          from dreamagent.schema import MemoryItem
          errors = 0
          for p in Path('fixtures').rglob('*.jsonl'):
              if 'anchors' in p.parts:
                  continue  # anchors use a different shape
              with p.open() as f:
                  for i, line in enumerate(f, 1):
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          MemoryItem.model_validate_json(line)
                      except ValidationError as e:
                          print(f'{p}:{i}: {e}')
                          errors += 1
          if errors:
              raise SystemExit(f'{errors} fixture validation errors')
          print('all fixtures valid')
          "

  comparison-docs:
    name: Comparison docs sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every comparison file exists
        run: |
          for f in docs/comparison/README.md docs/comparison/vs-mem0.md \
                   docs/comparison/vs-letta.md docs/comparison/vs-supermemory.md \
                   docs/comparison/vs-zep.md docs/comparison/vs-giant-context.md; do
            test -s "$f" || { echo "missing or empty: $f"; exit 1; }
          done
          echo "all comparison docs present"

      - name: Verify every ADR exists
        run: |
          for n in 001 002 003 004 005 006 007; do
            ls docs/adr/${n}-*.md 2>&1 | grep -q "${n}-" || { echo "missing ADR $n"; exit 1; }
          done
          echo "all ADRs present"
