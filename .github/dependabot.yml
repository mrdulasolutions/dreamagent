version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      pydantic-stack:
        patterns: ["pydantic*"]
      mlx-stack:
        patterns: ["mlx*"]
      dev-tools:
        patterns: ["pytest*", "ruff", "mypy"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
